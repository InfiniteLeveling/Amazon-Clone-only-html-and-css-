<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css" integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="main">
            <ul class="main-nav">
                <li class="logo"></li>
                <li class="deliver">   
                    <div class="icon"><i class="fa-solid fa-location-dot"></i></div>
                    <div class="delivery-msg">
                        <div class="delivery">Deliver to</div>
                        <div class="location">India</div>
                    </div>
                </li>
                <li class="search-section">
                    <select id="all">
                        <option value="all">All</option>
                    </select>

                    <input placeholder="search Amazon" class="search-bar">

                    <button class="search-button"><i class="fa-solid fa-magnifying-glass"></i></button>
                </li>
                <li class="account-section">
                    <div class="account">
                        <div class="hello">Hello,sign in</div>
                        <div class="list">Account & List <i class="fa-solid fa-caret-down"></i></div>
                    </div>
                </li>
                <li class="order-section">
                    <div class="order-element">
                        <div class="return">Returns</div>
                        <div class="order">& Order</div>
                    </div>
                </li>
                <li class="cart-section">
                    <div class="cart">
                        <div class="icon"></div>
                        <div class="num">0</div>
                    </div>
                    <div class="cart-name">Cart</div>
                </li>
            </ul>
        </nav>
    </header>
</body>
</html>
