<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <!-- Logo -->
            <div class="nav-item border-hover nav-logo">
                <a href="#" class="logo-link" aria-label="Amazon Home"></a>
            </div>

            <!-- Deliver To -->
            <div class="nav-item border-hover nav-deliver">
                <i class="fa-solid fa-location-dot location-icon"></i>
                <div class="nav-text">
                    <span class="line-1">Deliver to</span>
                    <span class="line-2">India</span>
                </div>
            </div>

            <!-- Search Section -->
            <div class="nav-search">
                <select class="search-select">
                    <option value="all">All</option>
                    <option value="arts">Arts & Crafts</option>
                    <option value="automotive">Automotive</option>
                    <option value="baby">Baby</option>
                    <option value="beauty">Beauty & Personal Care</option>
                    <option value="books">Books</option>
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                </select>
                <input type="text" placeholder="Search Amazon" class="search-input">
                <button class="search-button" aria-label="Search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <!-- Account & Lists -->
            <div class="nav-item border-hover nav-account">
                <div class="nav-text">
                    <span class="line-1">Hello, sign in</span>
                    <span class="line-2">Account & Lists <i class="fa-solid fa-caret-down caret-icon"></i></span>
                </div>
            </div>

            <!-- Returns & Orders -->
            <div class="nav-item border-hover nav-orders">
                <div class="nav-text">
                    <span class="line-1">Returns</span>
                    <span class="line-2">& Orders</span>
                </div>
            </div>

            <!-- Cart Section -->
            <div class="nav-item border-hover nav-cart">
                <div class="cart-icon-container">
                    <i class="fa-solid fa-cart-shopping cart-icon"></i>
                    <span class="cart-count">0</span>
                </div>
                <span class="cart-title">Cart</span>
            </div>
        </nav>
    </header>
</body>
</html>
